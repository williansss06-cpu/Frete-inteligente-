<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel da Empresa</title>

<style>
body { font-family: Arial; background: #f1f5f9; }
.container { padding: 30px; }
.card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
button { padding: 10px; background: #0f766e; color: white; border: none; border-radius: 6px; cursor: pointer; }
input, select { width: 100%; padding: 10px; margin-bottom: 10px; }
</style>
</head>

<body>

<div class="container">

<h1>Painel da Empresa</h1>
<button onclick="sair()">Sair</button>

<div class="card">
<h3>Criar usuário</h3>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<select id="perfil">
  <option value="admin_empresa">Admin</option>
  <option value="operador">Operador</option>
</select>

<button onclick="criarUsuario()">Criar</button>
<div id="msg"></div>
</div>

<div class="card">
<h3>Usuários cadastrados</h3>
<div id="listaUsuarios"></div>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO",
  databaseURL: "SUA_DATABASE",
  projectId: "SEU_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();


// 🔐 1. PROTEÇÃO DE PÁGINA
const usuario = localStorage.getItem("usuario_id");
if (!usuario) {
  window.location.href = "/Frete-inteligente-/Login/index.html";
}

// 🧠 4. CONTROLE DE PERMISSÃO
const perfilLogado = localStorage.getItem("perfil");
if (perfilLogado !== "admin_empresa") {
  alert("Acesso restrito");
}


// 🚪 2. LOGOUT REAL
function sair() {
  auth.signOut().then(() => {
    localStorage.clear();
    window.location.href = "/Frete-inteligente-/Login/index.html";
  });
}


// 👥 3. CRIAR USUÁRIO
async function criarUsuario() {
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const perfil = document.getElementById("perfil").value;
  const msg = document.getElementById("msg");

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, senha);
    const uid = cred.user.uid;

    await db.ref("usuarios/" + uid).set({
      nome,
      email,
      perfil,
      empresa_id: localStorage.getItem("empresa_id"),
      data_cadastro: Date.now()
    });

    msg.innerHTML = "Usuário criado com sucesso!";
    carregarUsuarios();

  } catch (error) {
    msg.innerHTML = error.message;
    console.error(error);
  }
}


// 📊 5. LISTAR USUÁRIOS
function carregarUsuarios() {
  const lista = document.getElementById("listaUsuarios");
  lista.innerHTML = "";

  db.ref("usuarios").once("value").then(snapshot => {
    const dados = snapshot.val();

    for (let uid in dados) {
      const user = dados[uid];

      if (user.empresa_id === localStorage.getItem("empresa_id")) {
        lista.innerHTML += `
          <div>
            ✔ ${user.nome} - ${user.email} (${user.perfil})
          </div>
        `;
      }
    }
  });
}


// carregar ao abrir
carregarUsuarios();

</script>

</body>
</html>
