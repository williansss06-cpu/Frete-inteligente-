<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frete Inteligente - Acesso</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 450px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: #999;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .tab-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tab-btn.login {
      background: #667eea;
      color: white;
    }

    .tab-btn.login:hover {
      background: #5a67d8;
    }

    .tab-btn.cadastro {
      background: #48bb78;
      color: white;
    }

    .tab-btn.cadastro:hover {
      background: #38a169;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }

    .btn-primary:hover {
      background: #5a67d8;
    }

    .msg {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      min-height: 40px;
    }

    .msg.erro {
      background: #fed7d7;
      color: #c53030;
    }

    .msg.sucesso {
      background: #c6f6d5;
      color: #276749;
    }

    .info-text {
      text-align: center;
      margin: 15px 0;
      color: #718096;
      font-size: 13px;
    }

    .info-text strong {
      color: #4a5568;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 8px;
    }

    .badge.novo {
      background: #48bb78;
      color: white;
    }

    .badge.cliente {
      background: #667eea;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚛 Frete Inteligente</h1>
      <p>Plataforma de gestão de fretes dedicada</p>
    </div>

    <!-- Divisores com textos conforme sua imagem -->
    <div class="divider">
      <span>📌 Clientes que já possui cadastro</span>
    </div>

    <!-- Botões de Login e Cadastro lado a lado -->
    <div class="tab-buttons">
      <button class="tab-btn login" onclick="mostrarAba('login')">
        🔐 Login
      </button>
      <button class="tab-btn cadastro" onclick="mostrarAba('cadastro')">
        ✨ Cadastro
      </button>
    </div>

    <div class="divider">
      <span>🆕 Novos clientes</span>
    </div>

    <!-- Aba de Login -->
    <div id="abaLogin" class="tab-content active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login_email" placeholder="seu@email.com" value="Williamss06@gmail.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login_senha" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="login()">Entrar</button>
      <div id="msg_login" class="msg"></div>
      
      <div class="info-text">
        <strong>Dica:</strong> Após o login, você terá acesso de acordo com seu perfil
      </div>
    </div>

    <!-- Aba de Cadastro -->
    <div id="abaCadastro" class="tab-content">
      <div class="form-group">
        <label>Nome da Empresa</label>
        <input type="text" id="cadastro_nome" placeholder="Digite o nome da empresa">
      </div>
      <div class="form-group">
        <label>CNPJ</label>
        <input type="text" id="cadastro_cnpj" placeholder="00.000.000/0001-00">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="cadastro_email" placeholder="contato@empresa.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="cadastro_senha" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn-primary" onclick="cadastrar()">Criar conta</button>
      <div id="msg_cadastro" class="msg"></div>
      
      <div class="info-text">
        ⏳ Após o cadastro, aguarde aprovação em até <strong>24h</strong>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const BASE = "/Frete-inteligente-";

    // Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyA6YNz6vagSyIJumrKeY1Ptr_6rTpMMZ_A",
      authDomain: "rota-22c3b.firebaseapp.com",
      databaseURL: "https://rota-22c3b-default-rtdb.firebaseio.com/",
      projectId: "rota-22c3b",
      storageBucket: "rota-22c3b.appspot.com"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Mostrar aba selecionada
    function mostrarAba(aba) {
      document.getElementById('abaLogin').classList.remove('active');
      document.getElementById('abaCadastro').classList.remove('active');
      
      if (aba === 'login') {
        document.getElementById('abaLogin').classList.add('active');
      } else {
        document.getElementById('abaCadastro').classList.add('active');
      }
    }

    // 🚀 FUNÇÃO DE LOGIN CORRIGIDA
    async function login() {
      const email = document.getElementById('login_email').value.trim();
      const senha = document.getElementById('login_senha').value.trim();
      const msg = document.getElementById('msg_login');

      msg.innerHTML = '';
      msg.className = 'msg';

      if (!email || !senha) {
        msg.innerHTML = 'Preencha email e senha';
        msg.classList.add('erro');
        return;
      }

      try {
        // 1️⃣ Autentica no Firebase
        const cred = await auth.signInWithEmailAndPassword(email, senha);
        const uid = cred.user.uid;

        // 2️⃣ Busca dados do usuário
        const snap = await db.ref('usuarios/' + uid).once('value');
        const user = snap.val();

        if (!user) {
          msg.innerHTML = 'Usuário não encontrado';
          msg.classList.add('erro');
          return;
        }

        // 3️⃣ Salva dados no localStorage
        localStorage.setItem('usuario_id', uid);
        localStorage.setItem('perfil', user.perfil);
        localStorage.setItem('empresa_id', user.empresa_id || '');
        localStorage.setItem('usuario_nome', user.nome);
        localStorage.setItem('usuario_email', user.email);

        // 4️⃣ Verifica status da empresa
        if (user.empresa_id) {
          const empresaSnap = await db.ref('empresas/' + user.empresa_id).once('value');
          const empresa = empresaSnap.val();
          
          if (empresa) {
            localStorage.setItem('empresa_status', empresa.status || 'ativo');
            
            // Se empresa estiver pendente, avisa mas ainda deixa entrar?
            if (empresa.status === 'pendente') {
              console.log('⚠️ Empresa pendente de aprovação');
              // Pode mostrar um aviso, mas ainda deixar entrar
            }
          }
        }

        // 5️⃣ ✅ REDIRECIONA PARA O SISTEMA (sempre!)
        console.log('✅ Login realizado com perfil:', user.perfil);
        window.location.href = BASE + '/Sistema/index.html';

      } catch (error) {
        console.error('Erro no login:', error);
        msg.classList.add('erro');
        
        if (error.code === 'auth/user-not-found') {
          msg.innerHTML = 'Email não cadastrado. Clique em "Cadastro" para criar uma conta.';
        } else if (error.code === 'auth/wrong-password') {
          msg.innerHTML = 'Senha incorreta. Tente novamente.';
        } else if (error.code === 'auth/invalid-email') {
          msg.innerHTML = 'Email inválido.';
        } else {
          msg.innerHTML = 'Erro: ' + error.message;
        }
      }
    }

    // 📝 FUNÇÃO DE CADASTRO CORRIGIDA
    async function cadastrar() {
      const nome = document.getElementById('cadastro_nome').value.trim();
      const cnpj = document.getElementById('cadastro_cnpj').value.trim();
      const email = document.getElementById('cadastro_email').value.trim();
      const senha = document.getElementById('cadastro_senha').value.trim();
      const msg = document.getElementById('msg_cadastro');

      msg.innerHTML = '';
      msg.className = 'msg';

      if (!nome || !cnpj || !email || !senha) {
        msg.innerHTML = 'Preencha todos os campos';
        msg.classList.add('erro');
        return;
      }

      if (senha.length < 6) {
        msg.innerHTML = 'Senha deve ter pelo menos 6 caracteres';
        msg.classList.add('erro');
        return;
      }

      try {
        // 1️⃣ Cria usuário no Auth
        const cred = await auth.createUserWithEmailAndPassword(email, senha);
        const uid = cred.user.uid;

        // 2️⃣ Cria empresa com status PENDENTE
        const empresaRef = db.ref('empresas').push();
        const empresaId = empresaRef.key;

        await empresaRef.set({
          nome_fantasia: nome,
          razao_social: nome,
          cnpj: cnpj.replace(/[^\d]/g, ''), // Remove máscara
          status: 'pendente', // ⚠️ AGUARDANDO APROVAÇÃO
          data_cadastro: Date.now(),
          plano: 'starter',
          usuarios_ativos: 1,
          usuarios_max: 3
        });

        // 3️⃣ Cria usuário como admin_empresa
        await db.ref('usuarios/' + uid).set({
          nome: nome,
          email: email,
          perfil: 'admin_empresa', // 👈 SEMPRE admin_empresa
          empresa_id: empresaId,
          status: 'ativo',
          data_cadastro: Date.now()
        });

        // 4️⃣ Salva dados
        localStorage.setItem('usuario_id', uid);
        localStorage.setItem('perfil', 'admin_empresa');
        localStorage.setItem('empresa_id', empresaId);
        localStorage.setItem('empresa_status', 'pendente');
        localStorage.setItem('usuario_nome', nome);
        localStorage.setItem('usuario_email', email);

        // 5️⃣ Mensagem de sucesso
        msg.innerHTML = '✅ Cadastro realizado! Aguarde aprovação em até 24h.';
        msg.classList.add('sucesso');

        // 6️⃣ Redireciona para tela de aguardando (opcional)
        setTimeout(() => {
          window.location.href = BASE + '/AguardandoAprovacao/index.html';
        }, 2000);

      } catch (error) {
        console.error('Erro no cadastro:', error);
        msg.classList.add('erro');
        
        if (error.code === 'auth/email-already-in-use') {
          msg.innerHTML = 'Email já cadastrado. Clique em "Login".';
        } else if (error.code === 'auth/invalid-email') {
          msg.innerHTML = 'Email inválido.';
        } else if (error.code === 'auth/weak-password') {
          msg.innerHTML = 'Senha muito fraca (mínimo 6 caracteres).';
        } else {
          msg.innerHTML = 'Erro: ' + error.message;
        }
      }
    }

    // Verifica se já tem plano selecionado (vindo da tela de planos)
    const planoSel = localStorage.getItem('plano_selecionado');
    if (planoSel) {
      console.log('Plano selecionado:', planoSel);
      // Se veio da tela de planos, abre direto a aba de cadastro
      mostrarAba('cadastro');
    }
  </script>
</body>
</html>
