<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frete Inteligente - Acesso</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #fff; }
    .wrapper { min-height: 100vh; display: grid; grid-template-columns: 1.2fr 1fr; }
    .hero { position: relative; display: flex; align-items: center; padding: 60px; }
    .hero video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.25; }
    .overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(15,23,42,.8), rgba(15,118,110,.5)); }
    .hero-content { position: relative; z-index: 2; max-width: 520px; }
    .logo { font-size: 42px; font-weight: bold; color: #34d399; }

    .panel {
      background: #f8fafc;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0f766e;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #115e59;
    }

    .abas {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .aba {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background: #eee;
      border-radius: 8px;
      font-weight: bold;
    }

    .ativa {
      background: #0f766e;
      color: #fff;
    }

    .escondido { display: none; }

    .msg {
      font-size: 13px;
      color: red;
      min-height: 20px;
      margin-top: 8px;
    }

    .sucesso { color: green; }

    @media (max-width: 900px) {
      .wrapper {
        grid-template-columns: 1fr;
      }
      .hero {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <section class="hero">
      <video autoplay muted loop playsinline>
        <source src="https://cdn.coverr.co/videos/coverr-trucks-driving-on-the-highway-3987/1080p.mp4" type="video/mp4">
      </video>
      <div class="overlay"></div>
      <div class="hero-content">
        <div class="logo">Frete Inteligente</div>
        <p>Plataforma de gestão de fretes dedicada</p>
      </div>
    </section>

    <section class="panel">
      <div class="card">
        <div class="abas">
          <div class="aba ativa" onclick="mostrarAba('login', event)">Login</div>
          <div class="aba" onclick="mostrarAba('cadastro', event)">Cadastro</div>
        </div>

        <div id="abaLogin">
          <input id="login_email" type="email" placeholder="Email">
          <input id="login_senha" type="password" placeholder="Senha">
          <button onclick="login()">Entrar</button>
          <div id="msg_login" class="msg"></div>
        </div>

        <div id="abaCadastro" class="escondido">
          <input id="cadastro_nome" placeholder="Nome da Empresa">
          <input id="cadastro_cnpj" placeholder="CNPJ">
          <input id="cadastro_email" type="email" placeholder="Email">
          <input id="cadastro_senha" type="password" placeholder="Senha">
          <button onclick="cadastrarUsuario()">Cadastrar</button>
          <div id="msg_cadastro" class="msg"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const BASE = "/Frete-inteligente-";

    const firebaseConfig = {
      apiKey: "AIzaSyA6YNz6vagSyIJumrKeY1Ptr_6rTpMMZ_A",
      authDomain: "rota-22c3b.firebaseapp.com",
      databaseURL: "https://rota-22c3b-default-rtdb.firebaseio.com/",
      projectId: "rota-22c3b",
      storageBucket: "rota-22c3b.appspot.com",
      messagingSenderId: "491665660350",
      appId: "1:491665660350:web:fb79aa28f612d321c081ef"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.database();

    function mostrarAba(tipo, e) {
      document.getElementById("abaLogin").classList.toggle("escondido", tipo !== "login");
      document.getElementById("abaCadastro").classList.toggle("escondido", tipo !== "cadastro");

      document.querySelectorAll(".aba").forEach(el => el.classList.remove("ativa"));
      e.target.classList.add("ativa");
    }

    async function login() {
      const email = document.getElementById("login_email").value.trim();
      const senha = document.getElementById("login_senha").value.trim();
      const msg = document.getElementById("msg_login");

      msg.innerHTML = "";
      msg.className = "msg";

      if (!email || !senha) {
        msg.innerHTML = "Preencha email e senha";
        return;
      }

      try {
        const cred = await auth.signInWithEmailAndPassword(email, senha);
        const uid = cred.user.uid;

        const snap = await db.ref("usuarios/" + uid).once("value");
        const user = snap.val();

        if (!user) {
          msg.innerHTML = "Usuário não encontrado";
          return;
        }

        localStorage.setItem("usuario_id", uid);
        localStorage.setItem("perfil", user.perfil || "");
        localStorage.setItem("empresa_id", user.empresa_id || "");

        if (user.perfil === "admin_plataforma") {
          window.location.href = BASE + "/Admin/index.html";
        } else {
          window.location.href = BASE + "/Sistema/index.html";
        }

      } catch (e) {
        console.error(e);

        if (e.code === "auth/user-not-found") {
          msg.innerHTML = "Usuário não encontrado";
        } else if (e.code === "auth/wrong-password") {
          msg.innerHTML = "Senha incorreta";
        } else if (e.code === "auth/invalid-email") {
          msg.innerHTML = "Email inválido";
        } else {
          msg.innerHTML = "Erro no login: " + e.message;
        }
      }
    }

    async function cadastrarUsuario() {
      const nome = document.getElementById("cadastro_nome").value.trim();
      const email = document.getElementById("cadastro_email").value.trim();
      const senha = document.getElementById("cadastro_senha").value.trim();
      const cnpj = document.getElementById("cadastro_cnpj").value.trim();

      const msg = document.getElementById("msg_cadastro");
      msg.innerHTML = "";
      msg.className = "msg";

      if (!nome || !email || !senha || !cnpj) {
        msg.innerHTML = "Preencha todos os campos";
        return;
      }

      if (senha.length < 6) {
        msg.innerHTML = "Senha deve ter pelo menos 6 caracteres";
        return;
      }

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, senha);
        const uid = cred.user.uid;

        const empresaRef = db.ref("empresas").push();
        const empresaId = empresaRef.key;

        await empresaRef.set({
          nome_fantasia: nome,
          cnpj: cnpj,
          status: "ativo",
          data_cadastro: Date.now()
        });

        await db.ref("usuarios/" + uid).set({
          nome: nome,
          email: email,
          perfil: "admin_empresa",
          empresa_id: empresaId,
          status: "ativo",
          data_cadastro: Date.now()
        });

        localStorage.setItem("usuario_id", uid);
        localStorage.setItem("perfil", "admin_empresa");
        localStorage.setItem("empresa_id", empresaId);

        msg.className = "msg sucesso";
        msg.innerHTML = "Cadastro realizado com sucesso!";

        setTimeout(() => {
          window.location.href = BASE + "/Sistema/index.html";
        }, 1000);

      } catch (error) {
        console.error(error);

        if (error.code === "auth/email-already-in-use") {
          msg.innerHTML = "Email já cadastrado";
        } else if (error.code === "auth/invalid-email") {
          msg.innerHTML = "Email inválido";
        } else if (error.code === "auth/weak-password") {
          msg.innerHTML = "Senha muito fraca";
        } else if (error.code === "auth/operation-not-allowed") {
          msg.innerHTML = "Método de login por email/senha não está ativado no Firebase";
        } else {
          msg.innerHTML = "Erro ao cadastrar: " + error.message;
        }
      }
    }
  </script>
</body>
</html>
