<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frete Inteligente - Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0b1220 0%, #0f172a 50%, #115e59 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      color: #0f172a;
      margin: 0 0 10px 0;
      font-size: 28px;
    }
    .subtitle {
      color: #64748b;
      margin-bottom: 30px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #0f766e;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }
    button:hover {
      background: #115e59;
    }
    .link {
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }
    .link a {
      color: #0f766e;
      text-decoration: none;
      font-weight: bold;
    }
    .msg {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .msg.error {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      display: block;
    }
    .msg.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🔐 Frete Inteligente</h1>
    <div class="subtitle">Plataforma de gestão de fretes dedicada</div>
    
    <input type="email" id="email" placeholder="E-mail" value="williamss06@gmail.com">
    <input type="password" id="senha" placeholder="Senha" value="123456">
    
    <button onclick="fazerLogin()">Entrar</button>
    
    <div class="link">
      <a href="../index.html">← Voltar para cadastro</a>
    </div>
    
    <div id="msg" class="msg"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    // Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyA6YNz6vagSyIJumrKeY1Ptr_6rTpMMZ_A",
      authDomain: "rota-22c3b.firebaseapp.com",
      databaseURL: "https://rota-22c3b-default-rtdb.firebaseio.com",
      projectId: "rota-22c3b",
      storageBucket: "rota-22c3b.appspot.com",
      messagingSenderId: "491665660350",
      appId: "1:491665660350:web:fb79aa28f612d321c081ef"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    async function fazerLogin() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const msg = document.getElementById('msg');

      if (!email || !senha) {
        msg.className = 'msg error';
        msg.textContent = 'Preencha e-mail e senha';
        return;
      }

      try {
        msg.className = 'msg';
        msg.textContent = '⏳ Entrando...';
        
        const credential = await auth.signInWithEmailAndPassword(email, senha);
        const user = credential.user;
        
        // Buscar dados do usuário
        const userSnapshot = await db.ref('usuarios/' + user.uid).once('value');
        const userData = userSnapshot.val();

        if (!userData) {
          msg.className = 'msg error';
          msg.textContent = 'Usuário não encontrado';
          return;
        }

        // Verificar status da empresa
        if (userData.empresa_id) {
          const empresaSnapshot = await db.ref('empresas/' + userData.empresa_id).once('value');
          const empresaData = empresaSnapshot.val();

          if (empresaData && empresaData.status === 'pendente') {
            msg.className = 'msg error';
            msg.textContent = '⏳ Empresa aguardando aprovação';
            return;
          }

          if (empresaData && empresaData.status === 'inativo') {
            msg.className = 'msg error';
            msg.textContent = '❌ Empresa inativa';
            return;
          }
        }

        // Salvar dados na sessão
        localStorage.setItem('usuario_id', user.uid);
        localStorage.setItem('usuario_nome', userData.nome || '');
        localStorage.setItem('usuario_email', userData.email || '');
        localStorage.setItem('empresa_id', userData.empresa_id || '');
        localStorage.setItem('perfil', userData.perfil || 'operador');

        msg.className = 'msg success';
        msg.textContent = '✅ Login realizado! Redirecionando...';

        // 🔥 REDIRECIONAMENTO CORRETO para sistema.html
        setTimeout(() => {
          window.location.href = '../sistema.html';
        }, 1500);

      } catch (error) {
        console.error('Erro:', error);
        msg.className = 'msg error';
        
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          msg.textContent = 'E-mail ou senha incorretos';
        } else if (error.code === 'auth/invalid-email') {
          msg.textContent = 'E-mail inválido';
        } else {
          msg.textContent = 'Erro ao fazer login';
        }
      }
    }
  </script>
</body>
</html>
