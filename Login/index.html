<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frete Inteligente - Acesso</title>

<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial; background: #0f172a; color: #fff; }
.wrapper { min-height: 100vh; display: grid; grid-template-columns: 1.2fr 1fr; }
.hero { position: relative; display: flex; align-items: center; padding: 60px; }
.hero video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.25; }
.overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(15,23,42,.8), rgba(15,118,110,.5)); }
.hero-content { position: relative; z-index: 2; max-width: 520px; }
.logo { font-size: 42px; font-weight: bold; color: #34d399; }
.panel { background: #f8fafc; color: #000; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; }
input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; }
button { width: 100%; padding: 12px; background: #0f766e; color: white; border: none; border-radius: 8px; cursor: pointer; }
.aba { flex:1; padding:10px; text-align:center; cursor:pointer; background:#eee; }
.ativa { background:#0f766e; color:#fff; }
.escondido { display:none; }
.msg { font-size: 13px; color: red; min-height: 20px; }
.sucesso { color: green; }
</style>
</head>

<body>

<div class="wrapper">

<section class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-trucks-driving-on-the-highway-3987/1080p.mp4">
  </video>
  <div class="overlay"></div>
  <div class="hero-content">
    <div class="logo">Frete Inteligente</div>
    <p>Plataforma de gestão de fretes dedicada</p>
  </div>
</section>

<section class="panel">
<div class="card">

<div style="display:flex; gap:10px; margin-bottom:20px;">
  <div class="aba ativa" onclick="mostrarAba('login', event)">Login</div>
  <div class="aba" onclick="mostrarAba('cadastro', event)">Cadastro</div>
</div>

<div id="abaLogin">
  <input id="login_email" placeholder="Email">
  <input id="login_senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <div id="msg_login" class="msg"></div>
</div>

<div id="abaCadastro" class="escondido">
  <input id="cadastro_nome" placeholder="Nome da Empresa">
  <input id="cadastro_cnpj" placeholder="CNPJ">
  <input id="cadastro_email" placeholder="Email">
  <input id="cadastro_senha" type="password" placeholder="Senha">
  <button onclick="cadastrarUsuario()">Cadastrar</button>
  <div id="msg_cadastro" class="msg"></div>
</div>

</div>
</section>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  databaseURL: "SEU_DB",
  projectId: "SEU_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// ABAS
function mostrarAba(tipo, e) {
  document.getElementById("abaLogin").classList.toggle("escondido", tipo !== "login");
  document.getElementById("abaCadastro").classList.toggle("escondido", tipo !== "cadastro");

  document.querySelectorAll(".aba").forEach(el => el.classList.remove("ativa"));
  e.target.classList.add("ativa");
}

// LOGIN REAL
async function login() {
  const email = login_email.value.trim();
  const senha = login_senha.value.trim();
  const msg = msg_login;

  msg.innerHTML = "";

  try {
    const cred = await auth.signInWithEmailAndPassword(email, senha);
    const uid = cred.user.uid;

    const snap = await db.ref("usuarios/" + uid).once("value");
    const user = snap.val();

    if (!user) {
      msg.innerHTML = "Usuário não encontrado";
      return;
    }

    localStorage.setItem("usuario_id", uid);
    localStorage.setItem("perfil", user.perfil);

    if (user.perfil === "admin_plataforma") {
  location.href = "/Frete-inteligente-/Admin/index.html";
} 
else if (user.perfil === "admin_empresa") {
  location.href = "/Frete-inteligente-/empresa/index.html";
} 
else {
  location.href = "/Frete-inteligente-/Sistema/index.html";
    }

  } catch (e) {
    msg.innerHTML = "Erro no login";
  }
}

// CADASTRO REAL
async function cadastrarUsuario() {
  const nome = cadastro_nome.value;
  const email = cadastro_email.value;
  const senha = cadastro_senha.value;
  const cnpj = cadastro_cnpj.value;
  const msg = msg_cadastro;

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, senha);
    const uid = cred.user.uid;

    const empresaRef = db.ref("empresas").push();

    await empresaRef.set({
      nome,
      cnpj
    });

    await db.ref("usuarios/" + uid).set({
      nome,
      email,
      perfil: "admin_empresa",
      empresa_id: empresaRef.key
    });

    msg.className = "msg sucesso";
    msg.innerHTML = "Cadastro realizado";

  } catch (e) {
    msg.innerHTML = "Erro ao cadastrar";
  }
}
</script>

</body>
</html>
