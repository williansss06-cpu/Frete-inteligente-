<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frete Inteligente - Acesso</title>

<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #0f172a; color: #fff; }
.wrapper { min-height: 100vh; display: grid; grid-template-columns: 1.2fr 1fr; }
.hero { position: relative; overflow: hidden; display: flex; align-items: center; padding: 60px; }
.hero video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.28; }
.overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(15,23,42,.75), rgba(15,118,110,.45)); }
.hero-content { position: relative; z-index: 2; max-width: 560px; }
.tag { display: inline-block; padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); margin-bottom: 18px; font-size: 13px; font-weight: 700; }
.logo { font-size: 44px; font-weight: 800; margin-bottom: 16px; color: #34d399; }
.subtitle { font-size: 18px; line-height: 1.65; color: #e2e8f0; margin-bottom: 24px; }
.bullets { color: #cbd5e1; line-height: 1.9; font-size: 15px; }
.panel { background: #f8fafc; color: #0f172a; display: flex; align-items: center; justify-content: center; padding: 40px; }
.card { width: 100%; max-width: 460px; background: #fff; border-radius: 18px; padding: 30px; box-shadow: 0 20px 50px rgba(15,23,42,.12); }
input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 12px; }
button { width: 100%; background:#0f766e;color:#fff;border:none;padding:14px;border-radius:12px;cursor:pointer;font-weight:bold; }
button:hover { background:#0a5c55; }
.aba { flex: 1; text-align: center; padding: 10px; border-radius: 10px; background: #f1f5f9; color: #64748b; cursor: pointer; font-weight: bold; }
.aba.ativa { background: #0f766e; color: white; }
.escondido { display: none; }
.msg { font-size: 13px; color: red; margin-top: 5px; min-height: 20px; }
.sucesso { color: green; }
</style>
</head>

<body>

<div class="wrapper">

<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-trucks-driving-on-the-highway-3987/1080p.mp4">
  </video>
  <div class="overlay"></div>

  <div class="hero-content">
    <div class="tag">🚚 Plataforma SaaS Logística</div>
    <div class="logo">Frete Inteligente</div>
    <div class="subtitle">
        Plataforma para <b>simulação, negociação e gestão de fretes dedicados</b>
    </div>
    <div class="bullets">
        ✔ Simulação de frete<br>
        ✔ Gestão por cliente (CNPJ)<br>
        ✔ Controle de usuários<br>
        ✔ Dashboard executivo
    </div>
  </div>
</section>

<section class="panel">
<div class="card">

<div style="display:flex; gap:10px; margin-bottom:20px;">
<div class="aba ativa" onclick="mostrarAba('login')">Login</div>
<div class="aba" onclick="mostrarAba('cadastro')">Cadastro</div>
</div>

<div id="abaLogin">
<input id="login_email" placeholder="Email" type="email">
<input id="login_senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<div id="msg_login" class="msg"></div>
</div>

<div id="abaCadastro" class="escondido">
<input id="cadastro_cnpj" placeholder="CNPJ (apenas números)">
<input id="cadastro_nome" placeholder="Nome da Empresa">
<input id="cadastro_email" placeholder="Email" type="email">
<input id="cadastro_senha" placeholder="Senha" type="password">
<button onclick="cadastrarUsuario()">Cadastrar</button>
<div id="msg_cadastro" class="msg"></div>
</div>

</div>
</section>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// 🔥 SEUS DADOS DO FIREBASE - CORRETOS!
const firebaseConfig = {
  apiKey: "AIzaSyA6YNz6vagSyIJumrKeY1Ptr_6rTpMMZ_A",
  authDomain: "rota-22c3b.firebaseapp.com",
  databaseURL: "https://rota-22c3b-default-rtdb.firebaseio.com/",
  projectId: "rota-22c3b",
  storageBucket: "rota-22c3b.firebasestorage.app",
  messagingSenderId: "491665660350",
  appId: "1:491665660350:web:fb79aa28f612d321c081ef",
  measurementId: "G-8QBM2TCPY8"
};

// Inicializar Firebase
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
  console.log("✅ Firebase inicializado:", firebaseConfig.projectId);
}

const db = firebase.database();

// ABAS
function mostrarAba(aba) {
  document.getElementById('abaLogin').classList.toggle('escondido', aba !== 'login');
  document.getElementById('abaCadastro').classList.toggle('escondido', aba !== 'cadastro');
  
  // Atualizar estilo das abas
  document.querySelectorAll('.aba').forEach(el => el.classList.remove('ativa'));
  event.target.classList.add('ativa');
}

// LOGIN
async function login() {
  const email = document.getElementById("login_email").value.trim();
  const senha = document.getElementById("login_senha").value.trim();
  const msg = document.getElementById("msg_login");

  msg.innerHTML = "";
  msg.className = "msg";

  if (!email || !senha) {
    msg.innerHTML = "Preencha email e senha";
    return;
  }

  try {
    const snap = await db.ref("usuarios").once("value");
    let user = null;

    snap.forEach(c => {
      const u = c.val();
      if (u.email === email && u.senha === senha) {
        user = { ...u, id: c.key };
      }
    });

    if (!user) {
      msg.innerHTML = "Email ou senha inválidos";
      return;
    }

    if (user.status === "pendente") {
      msg.innerHTML = "Aguardando aprovação do administrador";
      return;
    }

    // 🔥 SALVAR DADOS NA SESSÃO
    localStorage.setItem("usuario_id", user.id);
    localStorage.setItem("usuario_nome", user.nome);
    localStorage.setItem("usuario_email", user.email);
    localStorage.setItem("perfil", user.perfil);
    localStorage.setItem("empresa_id", user.empresa_id || "");
    
    // Salvar CNPJ se existir
    if (user.cnpj) {
      localStorage.setItem("cliente_cnpj", user.cnpj);
    }

    console.log("✅ Login realizado:", { perfil: user.perfil, empresa: user.empresa_id });

    // 🚀 REDIRECIONAMENTO POR PERFIL (SEM BARRA)
    if (user.perfil === "admin_plataforma") {
      window.location.href = "admin/";
    } else if (user.perfil === "admin_empresa") {
      window.location.href = "empresa/";
    } else if (user.perfil === "analista" || user.perfil === "operador") {
      window.location.href = "sistema/";
    } else {
      window.location.href = "sistema/";
    }

  } catch (error) {
    console.error("Erro no login:", error);
    msg.innerHTML = "Erro ao fazer login";
  }
}

// CADASTRO
async function cadastrarUsuario() {
  const nome = document.getElementById("cadastro_nome").value.trim();
  const email = document.getElementById("cadastro_email").value.trim();
  const senha = document.getElementById("cadastro_senha").value.trim();
  const cnpj = document.getElementById("cadastro_cnpj").value.trim();

  const msg = document.getElementById("msg_cadastro");
  msg.innerHTML = "";
  msg.className = "msg";

  // Validações
  if (!nome || !email || !senha || !cnpj) {
    msg.innerHTML = "Preencha todos os campos";
    return;
  }

  if (senha.length < 6) {
    msg.innerHTML = "Senha deve ter pelo menos 6 caracteres";
    return;
  }

  if (cnpj.length < 14) {
    msg.innerHTML = "CNPJ deve ter 14 dígitos";
    return;
  }

  try {
    // Verificar se email já existe
    const emailSnap = await db.ref("usuarios")
      .orderByChild("email")
      .equalTo(email)
      .once("value");

    if (emailSnap.exists()) {
      msg.innerHTML = "Email já cadastrado";
      return;
    }

    // Verificar se CNPJ já existe
    const cnpjSnap = await db.ref("empresas")
      .orderByChild("cnpj")
      .equalTo(cnpj)
      .once("value");

    if (cnpjSnap.exists()) {
      msg.innerHTML = "CNPJ já cadastrado";
      return;
    }

    // 🔥 CRIAR EMPRESA
    const novaEmpresa = db.ref("empresas").push();
    const empresaId = novaEmpresa.key;

    await novaEmpresa.set({
      cnpj: cnpj,
      nome_fantasia: nome,
      razao_social: nome,
      status: "pendente",
      data_cadastro: Date.now()
    });

    // 🔥 CRIAR USUÁRIO ADMIN DA EMPRESA
    await db.ref("usuarios").push({
      nome: "Administrador",
      email: email,
      senha: senha,
      perfil: "admin_empresa",
      empresa_id: empresaId,
      cnpj: cnpj,
      status: "pendente",
      data_cadastro: Date.now()
    });

    msg.className = "msg sucesso";
    msg.innerHTML = "✅ Cadastro enviado! Aguarde aprovação.";

    // Limpar campos
    document.getElementById("cadastro_nome").value = "";
    document.getElementById("cadastro_email").value = "";
    document.getElementById("cadastro_senha").value = "";
    document.getElementById("cadastro_cnpj").value = "";

    // Voltar para aba de login após 2 segundos
    setTimeout(() => {
      mostrarAba('login');
    }, 2000);

  } catch (error) {
    console.error("Erro no cadastro:", error);
    msg.innerHTML = "Erro ao cadastrar";
  }
}

// Verificar se já está logado (opcional)
window.addEventListener('load', function() {
  const usuarioId = localStorage.getItem("usuario_id");
  if (usuarioId) {
    console.log("👤 Usuário já logado, redirecionando...");
    const perfil = localStorage.getItem("perfil");
    
    if (perfil === "admin_plataforma") {
      window.location.href = "admin/";
    } else if (perfil === "admin_empresa") {
      window.location.href = "empresa/";
    } else {
      window.location.href = "sistema/";
    }
  }
});
</script>

</body>
</html>
